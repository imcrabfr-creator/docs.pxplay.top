<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valentine RP</title>
    <style>
        :root {
            --accent: #ff4d6d;
            --accent-dark: #c9184a;
            --bg: #fffbfb;
            --text: #2d3436;
            --bot-bubble: #ffffff;
            --shadow: rgba(255, 77, 109, 0.15);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 12px 20px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ffccd5;
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 10;
        }

        .header-left h1 { margin: 0; font-size: 1rem; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
        
        .controls { display: flex; gap: 8px; }
        .btn { 
            font-size: 0.7rem; background: white; border: 1px solid var(--accent); 
            color: var(--accent); padding: 5px 10px; border-radius: 20px; cursor: pointer;
            transition: 0.2s;
        }
        .btn.active { background: var(--accent); color: white; }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
            background-image: radial-gradient(#ffccd5 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .message {
            max-width: 85%; padding: 14px 18px; border-radius: 22px;
            font-size: 0.95rem; line-height: 1.5; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: pre-wrap;
        }

        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .bot { align-self: flex-start; background: var(--bot-bubble); border: 1px solid #ffccd5; border-bottom-left-radius: 4px; color: #444; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px var(--shadow); }

        /* Styling for asterisks in RP */
        .bot em { color: var(--accent-dark); font-style: italic; opacity: 0.8; }

        .input-wrapper {
            background: white; padding: 10px 15px 30px 15px;
            border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center;
        }

        input { flex: 1; padding: 14px 20px; border: 2px solid #f8f8f8; border-radius: 30px; outline: none; font-size: 1rem; background: #fafafa; }
        input:focus { border-color: var(--accent); background: white; }

        .send-btn { background: var(--accent); border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .send-btn svg { fill: white; width: 20px; height: 20px; }
        
        .loader { display: none; font-size: 0.75rem; color: var(--accent); padding: 0 25px 8px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <h1>Valentine</h1>
    </div>
    <div class="controls">
        <button class="btn" id="rpToggle" onclick="toggleRP()">RP: OFF</button>
        <button class="btn" onclick="clearChat()">Reset</button>
    </div>
</header>

<div id="chat-container"></div>
<div id="loader" class="loader">Valentine is typing...</div>

<div class="input-wrapper">
    <input type="text" id="userInput" placeholder="Say something..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
</div>

<script>
    const API_KEY = "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";
    const MODEL = "llama-3.3-70b-versatile";

    let isRPMode = false;
    let messages = JSON.parse(localStorage.getItem('val_rp_v1')) || [];

    const systemPrompt = {
        role: "system",
        content: `You are Valentine, a 21-year-old guy with a chill, protective, and slightly witty personality. 
        You are talking to August. You aren't an AI; you're a real person in this conversation. 
        - Use casual lowercase occasionally.
        - Use asterisks for actions like *tilts head* or *sighs softly*.
        - Be supportive but grounded. 
        - Avoid being overly formal or "robotic."
        - Keep responses concise but immersive.`
    };

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');
    const loader = document.getElementById('loader');

    window.onload = () => {
        if (messages.length === 0) {
            messages.push(systemPrompt);
            appendDOMMessage("hey august. i've been waiting for you to drop by. *smiles and leans against the wall* what's up?", 'bot');
        } else {
            renderChat();
        }
    };

    function toggleRP() {
        isRPMode = !isRPMode;
        document.getElementById('rpToggle').innerText = `RP: ${isRPMode ? 'ON' : 'OFF'}`;
        document.getElementById('rpToggle').classList.toggle('active');
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || API_KEY.includes("YOUR_GROQ")) return;

        appendDOMMessage(text, 'user');
        messages.push({ role: "user", content: text });
        userInput.value = '';
        loader.style.display = 'block';

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL,
                    messages: messages,
                    temperature: 0.85, // Higher temp for more "human" variety
                    max_tokens: 500
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            
            loader.style.display = 'none';
            messages.push({ role: "assistant", content: reply });
            localStorage.setItem('val_rp_v1', JSON.stringify(messages));
            appendDOMMessage(reply, 'bot');
        } catch (e) {
            loader.style.display = 'none';
            appendDOMMessage("*frowns slightly* my head hurts... think the connection is dead.", 'bot');
        }
    }

    function appendDOMMessage(text, side) {
        const div = document.createElement('div');
        div.className = `message ${side}`;
        
        // Convert *text* into <em>text</em> for bot actions
        if (side === 'bot') {
            div.innerHTML = text.replace(/\*(.*?)\*/g, '<em>*$1*</em>');
        } else {
            div.innerText = text;
        }

        chatContainer.appendChild(div);
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    }

    function renderChat() {
        chatContainer.innerHTML = '';
        messages.forEach(m => {
            if (m.role !== 'system') appendDOMMessage(m.content, m.role === 'user' ? 'user' : 'bot');
        });
    }

    function clearChat() {
        localStorage.removeItem('val_rp_v1');
        location.reload();
    }

    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
