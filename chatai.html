<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valentine AI</title>
    <style>
        :root {
            --accent: #ff4d6d;
            --accent-soft: #ffccd5;
            --bg: #fffbfb;
            --text: #2d3436;
            --bot-bubble: #ffffff;
            --shadow: rgba(255, 77, 109, 0.15);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Styling */
        header {
            padding: 18px;
            background: white;
            text-align: center;
            border-bottom: 1px solid var(--accent-soft);
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            color: var(--text);
            border: 1px solid var(--accent-soft);
            border-bottom-left-radius: 4px;
        }

        .user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 10px var(--shadow);
        }

        /* Input Area */
        .input-wrapper {
            background: white;
            padding: 15px 15px 35px 15px; /* Extra bottom padding for mobile gesture bars */
            border-top: 1px solid var(--accent-soft);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #f0f0f0;
            border-radius: 30px;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 8px var(--shadow);
        }

        button {
            background: var(--accent);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        button:active {
            transform: scale(0.9);
            background: #e03a58;
        }

        button svg {
            fill: white;
            width: 20px;
            height: 20px;
        }

        /* Typing Animation */
        .typing {
            font-style: italic;
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 5px;
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>Valentine</h1>
</header>

<div id="chat-container">
    <div class="message bot">Hey August. I'm here. What's up?</div>
</div>

<div id="typing-indicator" class="typing" style="padding-left: 25px;">Valentine is thinking...</div>

<div class="input-wrapper">
    <input type="text" id="userInput" placeholder="Message Valentine..." autocomplete="off">
    <button onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
</div>

<script>
    const API_KEY = "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";
    const MODEL = "llama-3-70b";

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');
    const typingIndicator = document.getElementById('typing-indicator');

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        showTyping(true);

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { 
                            role: "system", 
                            content: "You are Valentine, a chill, supportive, and grounded companion talking to August. Your tone is natural, slightly witty, and authentic. Keep responses concise and engaging." 
                        },
                        { role: "user", content: text }
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            
            showTyping(false);
            appendMessage(reply, 'bot');
        } catch (error) {
            showTyping(false);
            appendMessage("I hit a snag. Check your API key or connection.", 'bot');
        }
    }

    function appendMessage(text, side) {
        const div = document.createElement('div');
        div.className = `message ${side}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        
        // Auto-scroll to bottom
        chatContainer.scrollTo({
            top: chatContainer.scrollHeight,
            behavior: 'smooth'
        });
    }

    function showTyping(isTyping) {
        typingIndicator.style.display = isTyping ? 'block' : 'none';
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
