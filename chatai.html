<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valentine AI</title>
    <style>
        :root {
            --accent: #ff4d6d;
            --accent-soft: #ffccd5;
            --bg: #fffbfb;
            --text: #2d3436;
            --bot-bubble: #ffffff;
            --shadow: rgba(255, 77, 109, 0.15);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--accent-soft);
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
        }

        #status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            border: 1px solid var(--accent-soft);
            border-bottom-left-radius: 4px;
        }

        .user {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .input-wrapper {
            background: white;
            padding: 10px 15px 30px 15px;
            border-top: 1px solid var(--accent-soft);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #f0f0f0;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: var(--accent);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button svg { fill: white; width: 18px; height: 18px; }
        
        .loader { display: none; font-size: 0.8rem; color: var(--accent); padding: 0 25px 10px; font-style: italic; }
    </style>
</head>
<body>

<header>
    <div id="status-dot"></div>
    <h1>Valentine</h1>
</header>

<div id="chat-container">
    <div class="message bot">Yo August. I'm locked in. What's the move?</div>
</div>

<div id="loader" class="loader">Valentine is typing...</div>

<div class="input-wrapper">
    <input type="text" id="userInput" placeholder="Message..." autocomplete="off">
    <button onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
</div>

<script>
    // --- SETTINGS ---
    const API_KEY = "YOUR_GROQ_API_KEY_HERE"; 
    const MODEL = "llama-3.3-70b-versatile"; // Latest high-performance model

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');
    const loader = document.getElementById('loader');
    const statusDot = document.getElementById('status-dot');

    // Simple status check
    if (API_KEY !== "YOUR_GROQ_API_KEY_HERE") {
        statusDot.style.background = "#2ecc71"; // Green if key is likely present
    } else {
        statusDot.style.background = "#e74c3c"; // Red if still default
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || API_KEY === "YOUR_GROQ_API_KEY_HERE") return;

        appendMessage(text, 'user');
        userInput.value = '';
        loader.style.display = 'block';
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { 
                            role: "system", 
                            content: "You are Valentine, a chill, supportive, and grounded companion for August. Speak naturally, keep it concise, and be authentically helpful." 
                        },
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            
            loader.style.display = 'none';
            appendMessage(reply, 'bot');
        } catch (error) {
            loader.style.display = 'none';
            appendMessage("Error connecting to Groq. Check your key.", 'bot');
        }
    }

    function appendMessage(text, side) {
        const div = document.createElement('div');
        div.className = `message ${side}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    }

    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
