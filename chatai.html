<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valentine AI</title>
    <style>
        :root {
            --accent: #ff4d6d;
            --accent-soft: #ffccd5;
            --bg: #fffbfb;
            --text: #2d3436;
            --bot-bubble: #ffffff;
            --shadow: rgba(255, 77, 109, 0.15);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent-soft);
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 8px; }
        header h1 { margin: 0; font-size: 1.1rem; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
        
        .clear-btn { 
            font-size: 0.7rem; background: none; border: 1px solid var(--accent); 
            color: var(--accent); padding: 4px 8px; border-radius: 12px; cursor: pointer;
        }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .message {
            max-width: 85%; padding: 12px 16px; border-radius: 18px;
            font-size: 0.95rem; line-height: 1.4; animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot { align-self: flex-start; background: var(--bot-bubble); border: 1px solid var(--accent-soft); border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }

        .input-wrapper {
            background: white; padding: 10px 15px 30px 15px;
            border-top: 1px solid var(--accent-soft); display: flex; gap: 10px;
        }

        input { flex: 1; padding: 12px 18px; border: 2px solid #f0f0f0; border-radius: 25px; outline: none; font-size: 1rem; }
        .send-btn { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn svg { fill: white; width: 18px; height: 18px; }
        .loader { display: none; font-size: 0.8rem; color: var(--accent); padding: 0 25px 10px; font-style: italic; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div id="status-dot"></div>
        <h1>Valentine</h1>
    </div>
    <button class="clear-btn" onclick="clearMemory()">Clear Chat</button>
</header>

<div id="chat-container"></div>

<div id="loader" class="loader">Valentine is thinking...</div>

<div class="input-wrapper">
    <input type="text" id="userInput" placeholder="Message..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
</div>

<script>
    // --- SETTINGS ---
    const API_KEY = "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"; 
    const MODEL = "llama-3.3-70b-versatile";

    let messages = JSON.parse(localStorage.getItem('valentine_chat')) || [
        { role: "system", content: "You are Valentine, a chill, supportive, and grounded companion for August. You have a memory and can refer back to things August has said. Keep responses concise and authentic." }
    ];

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');
    const loader = document.getElementById('loader');
    const statusDot = document.getElementById('status-dot');

    // Initial load
    window.onload = () => {
        if (API_KEY !== "YOUR_GROQ_API_KEY_HERE") statusDot.style.background = "#2ecc71";
        renderChat();
    };

    function renderChat() {
        chatContainer.innerHTML = '';
        messages.forEach(msg => {
            if (msg.role !== 'system') {
                appendDOMMessage(msg.content, msg.role === 'user' ? 'user' : 'bot');
            }
        });
        if (messages.length === 1) {
            appendDOMMessage("Yo August. I'm here. What's on your mind?", 'bot');
        }
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text || API_KEY === "YOUR_GROQ_API_KEY_HERE") return;

        // Update UI and Memory
        appendDOMMessage(text, 'user');
        messages.push({ role: "user", content: text });
        userInput.value = '';
        loader.style.display = 'block';
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: messages, // Sending the whole memory
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            
            loader.style.display = 'none';
            messages.push({ role: "assistant", content: reply });
            saveMemory();
            appendDOMMessage(reply, 'bot');
        } catch (error) {
            loader.style.display = 'none';
            appendDOMMessage("I'm having trouble remembering right now. Check your key.", 'bot');
        }
    }

    function appendDOMMessage(text, side) {
        const div = document.createElement('div');
        div.className = `message ${side}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    }

    function saveMemory() {
        localStorage.setItem('valentine_chat', JSON.stringify(messages));
    }

    function clearMemory() {
        localStorage.removeItem('valentine_chat');
        location.reload();
    }

    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
