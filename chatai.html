<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RP Hub</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --bg: #f8f9fa;
            --sidebar-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --bubble-bot: #ffffff;
            --border: #e9ecef;
            --shadow: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body { margin: 0; padding: 0; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        #sidebar {
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 20;
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { margin: 0; font-size: 1.2rem; color: var(--primary); }
        .new-chat-btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }

        #chat-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .chat-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .chat-item:hover { background: #f1f2f6; }
        .chat-item.active { background: var(--primary-light); color: white; }
        .chat-item.active .delete-btn { color: white; }
        .chat-name { font-weight: 600; font-size: 0.95rem; }
        .delete-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; padding: 0; line-height: 1; }

        /* Main Content */
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }

        header { padding: 15px 20px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; z-index: 10; box-shadow: 0 2px 10px var(--shadow); }
        .menu-btn { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-main); padding: 0; }
        header h1 { margin: 0; font-size: 1.1rem; color: var(--text-main); }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }

        .message { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; animation: popIn 0.2s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bot { align-self: flex-start; background: var(--bubble-bot); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .bot em { color: var(--primary); font-style: italic; font-weight: 500; }

        .input-wrapper { background: white; padding: 15px 20px 30px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 14px 20px; border: 2px solid #f1f2f6; border-radius: 25px; outline: none; font-size: 1rem; background: #f8f9fa; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: var(--primary-light); background: white; }
        .send-btn { background: var(--primary); border: none; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .send-btn svg { fill: white; width: 20px; height: 20px; }

        /* Modal */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99; justify-content: center; align-items: center; }
        .modal { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .modal h3 { margin: 0 0 10px 0; }
        .modal input, .modal textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; }
        .modal textarea { resize: vertical; min-height: 80px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .modal-btns button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #f1f2f6; color: var(--text-main); }
        .btn-create { background: var(--primary); color: white; }

        .loader { display: none; font-size: 0.8rem; color: var(--primary); padding: 0 25px 10px; font-weight: 600; font-style: italic; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            #sidebar { position: absolute; height: 100%; transform: translateX(-100%); box-shadow: 2px 0 15px rgba(0,0,0,0.1); }
            #sidebar.open { transform: translateX(0); }
            .menu-btn { display: block; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h2>Characters</h2>
        <button class="new-chat-btn" onclick="openModal()">+ New</button>
    </div>
    <div id="chat-list"></div>
</div>

<div id="main-content">
    <header>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h1 id="header-title">Select a Character</h1>
    </header>

    <div id="chat-container"></div>
    <div id="loader" class="loader">Typing...</div>

    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<div id="overlay">
    <div class="modal">
        <h3>New Character</h3>
        <input type="text" id="charName" placeholder="Character Name (e.g., Valentine)">
        <textarea id="charPersonality" placeholder="Describe their personality, age, and how they act..."></textarea>
        <input type="text" id="charFirstMsg" placeholder="First message (e.g., *smiles* Hey there.)">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-create" onclick="createNewChat()">Create</button>
        </div>
    </div>
</div>

<script>
    // --- SETTINGS ---
    const API_KEY = "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";
    const MODEL = "llama-3.3-70b-versatile";

    // --- DATA STRUCTURE ---
    let appData = JSON.parse(localStorage.getItem('rp_hub_data')) || {
        activeId: null,
        chats: {}
    };

    // DOM Elements
    const chatList = document.getElementById('chat-list');
    const chatContainer = document.getElementById('chat-container');
    const headerTitle = document.getElementById('header-title');
    const userInput = document.getElementById('userInput');
    const loader = document.getElementById('loader');
    const overlay = document.getElementById('overlay');
    const sidebar = document.getElementById('sidebar');

    // Initialize App
    window.onload = () => {
        // Create default Valentine chat if app is empty
        if (Object.keys(appData.chats).length === 0) {
            const defaultId = 'chat_' + Date.now();
            appData.chats[defaultId] = {
                name: 'Valentine',
                messages: [
                    { role: "system", content: "You are Valentine, a 21-year-old chill, protective guy. You use casual lowercase and asterisks for actions like *smiles*." },
                    { role: "assistant", content: "hey august. *leans against the wall* what's up?" }
                ]
            };
            appData.activeId = defaultId;
            saveData();
        }
        
        renderSidebar();
        if (appData.activeId && appData.chats[appData.activeId]) {
            loadChat(appData.activeId);
        }
    };

    // --- CORE FUNCTIONS ---
    function saveData() {
        localStorage.setItem('rp_hub_data', JSON.stringify(appData));
    }

    function renderSidebar() {
        chatList.innerHTML = '';
        Object.keys(appData.chats).forEach(id => {
            const chat = appData.chats[id];
            const div = document.createElement('div');
            div.className = `chat-item ${id === appData.activeId ? 'active' : ''}`;
            div.innerHTML = `
                <span class="chat-name" onclick="loadChat('${id}')">${chat.name}</span>
                <button class="delete-btn" onclick="deleteChat('${id}', event)">×</button>
            `;
            chatList.appendChild(div);
        });
    }

    function loadChat(id) {
        appData.activeId = id;
        saveData();
        renderSidebar();
        
        const chat = appData.chats[id];
        headerTitle.innerText = chat.name;
        chatContainer.innerHTML = '';
        
        chat.messages.forEach(msg => {
            if (msg.role !== 'system') appendDOMMessage(msg.content, msg.role === 'user' ? 'user' : 'bot');
        });

        // Close sidebar on mobile after selecting
        if (window.innerWidth <= 768) toggleSidebar();
    }

    function deleteChat(id, event) {
        event.stopPropagation(); // Prevent loading the chat when clicking delete
        if (confirm("Delete this character?")) {
            delete appData.chats[id];
            if (appData.activeId === id) appData.activeId = Object.keys(appData.chats)[0] || null;
            saveData();
            renderSidebar();
            if (appData.activeId) loadChat(appData.activeId);
            else { headerTitle.innerText = "Select a Character"; chatContainer.innerHTML = ''; }
        }
    }

    async function sendMessage() {
        if (!appData.activeId || !appData.chats[appData.activeId]) return;
        const text = userInput.value.trim();
        if (!text || API_KEY.includes("YOUR_GROQ")) return;

        const chat = appData.chats[appData.activeId];

        appendDOMMessage(text, 'user');
        chat.messages.push({ role: "user", content: text });
        userInput.value = '';
        loader.style.display = 'block';
        loader.innerText = `${chat.name} is typing...`;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL,
                    messages: chat.messages,
                    temperature: 0.85
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            
            loader.style.display = 'none';
            chat.messages.push({ role: "assistant", content: reply });
            saveData();
            appendDOMMessage(reply, 'bot');
        } catch (e) {
            loader.style.display = 'none';
            appendDOMMessage("*Connection error. Check API key.*", 'bot');
        }
    }

    function appendDOMMessage(text, side) {
        const div = document.createElement('div');
        div.className = `message ${side}`;
        // Format asterisks for RP actions
        if (side === 'bot') {
            div.innerHTML = text.replace(/\*(.*?)\*/g, '<em>*$1*</em>');
        } else {
            div.innerText = text;
        }
        chatContainer.appendChild(div);
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
    }

    // --- MODAL & UI CONTROLS ---
    function openModal() { overlay.style.display = 'flex'; }
    function closeModal() { 
        overlay.style.display = 'none'; 
        document.getElementById('charName').value = '';
        document.getElementById('charPersonality').value = '';
        document.getElementById('charFirstMsg').value = '';
    }

    function createNewChat() {
        const name = document.getElementById('charName').value.trim();
        const personality = document.getElementById('charPersonality').value.trim();
        const firstMsg = document.getElementById('charFirstMsg').value.trim() || "*smiles* Hello.";

        if (!name || !personality) {
            alert("Please provide a name and personality!");
            return;
        }

        const id = 'chat_' + Date.now();
        appData.chats[id] = {
            name: name,
            messages: [
                { role: "system", content: `You are ${name}. ${personality} You are talking to August. Use asterisks for actions.` },
                { role: "assistant", content: firstMsg }
            ]
        };

        closeModal();
        saveData();
        renderSidebar();
        loadChat(id);
    }

    function toggleSidebar() { sidebar.classList.toggle('open'); }

    // Event Listeners
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    // Close sidebar if clicking outside on mobile
    document.addEventListener('click', (e) => {
        if (window.innerWidth <= 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !e.target.classList.contains('menu-btn')) {
            sidebar.classList.remove('open');
        }
    });
</script>

</body>
</html>
